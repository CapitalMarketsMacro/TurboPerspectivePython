<div class="blotter-container">
  <header class="blotter-header">
    <h1>FX Executions Blotter</h1>
    <span class="status" [class.connected]="status() === 'Connected'" [class.disconnected]="status() === 'Disconnected'">
      {{ status() }}
    </span>
  </header>
  <app-perspective-viewer-host (statusChange)="onStatusChange($event)"></app-perspective-viewer-host>
</div>
